version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
      POSTGRES_DB: cashflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: cashflow-nats
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222", "-p", "4222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cashflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tenant-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: cashflow-tenant-service
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: cashflow
      DB_PASSWORD: cashflow
      DB_NAME: cashflow
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
      OTEL_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  ingestion-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.ingestion
    container_name: cashflow-ingestion-service
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: cashflow
      DB_PASSWORD: cashflow
      DB_NAME: cashflow
      DB_SSLMODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_PREFETCH_COUNT: "10"
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: cashflow-ingestion-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  natsdata:
  rabbitmqdata:
