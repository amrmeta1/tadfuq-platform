openapi: "3.1.0"
info:
  title: CashFlow.ai Tenant & Identity API
  description: |
    Multi-tenant SaaS foundation for CashFlow.ai — agentic financial management for GCC SMEs.
    Authentication is handled by Keycloak (OIDC). Clients obtain JWT access tokens from the
    Keycloak token endpoint and present them as Bearer tokens to this API.
  version: "2.0.0"
  contact:
    name: Finch Engineering
    email: eng@finch.co

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Health check
  - name: Profile
    description: Current user profile
  - name: Tenants
    description: Tenant (organization) management
  - name: Members
    description: Tenant membership management
  - name: Audit
    description: Audit log access

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /me:
    get:
      tags: [Profile]
      summary: Get current user profile (auto-provisioned from Keycloak JWT)
      operationId: getProfile
      security:
        - KeycloakBearer: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tenants:
    post:
      tags: [Tenants]
      summary: Create a new tenant (requires tenant:create permission)
      operationId: createTenant
      security:
        - KeycloakBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Tenant created — caller is auto-added as tenant_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenants/{tenantID}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    get:
      tags: [Tenants]
      summary: Get tenant by ID
      operationId: getTenant
      security:
        - KeycloakBearer: []
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Tenant"
        "404":
          $ref: "#/components/responses/NotFound"

  /tenants/{tenantID}/members:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    get:
      tags: [Members]
      summary: List members of a tenant
      operationId: listMembers
      security:
        - KeycloakBearer: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_MembershipList"
    post:
      tags: [Members]
      summary: Add a member to the tenant (requires member:add permission)
      operationId: addMember
      security:
        - KeycloakBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInput"
      responses:
        "201":
          description: Membership created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Membership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenants/{tenantID}/members/{membershipID}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/MembershipID"
    delete:
      tags: [Members]
      summary: Remove a member from the tenant
      operationId: removeMember
      security:
        - KeycloakBearer: []
      responses:
        "204":
          description: Membership removed
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenants/{tenantID}/roles:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    post:
      tags: [Members]
      summary: Change a member's Keycloak client role
      operationId: changeMemberRole
      security:
        - KeycloakBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeMemberRoleInput"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Membership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs for current tenant (requires audit:read permission)
      operationId: listAuditLogs
      security:
        - KeycloakBearer: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_AuditLogList"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    KeycloakBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Keycloak-issued RS256 JWT. Obtain via:
        POST http://localhost:8180/realms/cashflow/protocol/openid-connect/token
        with grant_type=password, client_id=cashflow-api, client_secret=cashflow-api-secret

  parameters:
    TenantID:
      name: tenantID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MembershipID:
      name: membershipID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XTenantID:
      name: X-Tenant-ID
      in: header
      required: false
      description: Tenant ID (overridden by JWT tenant_id claim if present)
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden — insufficient Keycloak role/permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "validation error: name and slug are required"

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Finch Capital
        slug:
          type: string
          example: finch-capital
        plan:
          type: string
          example: free
        status:
          type: string
          enum: [active, suspended, deleted]
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTenantInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          example: Finch Capital
        slug:
          type: string
          example: finch-capital
        plan:
          type: string
          example: free
        metadata:
          type: object

    UpdateTenantInput:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
        status:
          type: string
          enum: [active, suspended]
        metadata:
          type: object

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sub:
          type: string
          description: Keycloak subject identifier
        email:
          type: string
          format: email
        full_name:
          type: string
        avatar_url:
          type: string
        status:
          type: string
          enum: [active, disabled, deleted]
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Membership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          description: Keycloak client role name
          enum: [tenant_admin, owner, finance_manager, accountant_readonly]
        status:
          type: string
          enum: [active, invited, disabled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AddMemberInput:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [tenant_admin, owner, finance_manager, accountant_readonly]

    ChangeMemberRoleInput:
      type: object
      required: [membership_id, role]
      properties:
        membership_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [tenant_admin, owner, finance_manager, accountant_readonly]

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        actor_sub:
          type: string
          description: Keycloak subject of the actor
        action:
          type: string
          example: tenant.created
        entity_type:
          type: string
        entity_id:
          type: string
        metadata:
          type: object
        ip_address:
          type: string
        user_agent:
          type: string
        occurred_at:
          type: string
          format: date-time

    Meta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # Wrapped API responses
    APIResponse_Tenant:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Tenant"
    APIResponse_TenantList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        meta:
          $ref: "#/components/schemas/Meta"
    APIResponse_User:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
    APIResponse_Membership:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Membership"
    APIResponse_MembershipList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        meta:
          $ref: "#/components/schemas/Meta"
    APIResponse_AuditLogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        meta:
          $ref: "#/components/schemas/Meta"
