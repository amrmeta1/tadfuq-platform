name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.5.0

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push tenant-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/cashflow/tenant-service:latest
            ${{ steps.login-ecr.outputs.registry }}/cashflow/tenant-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ingestion-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.ingestion
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/cashflow/ingestion-service:latest
            ${{ steps.login-ecr.outputs.registry }}/cashflow/ingestion-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name cashflow-dev-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Update Kubernetes deployments
        run: |
          kubectl set image deployment/tenant-service \
            tenant-service=${{ steps.login-ecr.outputs.registry }}/cashflow/tenant-service:${{ github.sha }} \
            -n default
          
          kubectl set image deployment/ingestion-service \
            ingestion-service=${{ steps.login-ecr.outputs.registry }}/cashflow/ingestion-service:${{ github.sha }} \
            -n default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tenant-service -n default --timeout=5m
          kubectl rollout status deployment/ingestion-service -n default --timeout=5m

      - name: Get deployment info
        id: deployment-info
        run: |
          TENANT_LB=$(kubectl get svc tenant-service -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "tenant_endpoint=http://${TENANT_LB}" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ steps.deployment-info.outputs.tenant_endpoint }}/health || exit 1

      - name: Deployment summary
        run: |
          echo "## Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant Service**: ${{ steps.deployment-info.outputs.tenant_endpoint }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: cashflow-dev-cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
