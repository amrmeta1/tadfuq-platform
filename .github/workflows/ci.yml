name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cashflow
          POSTGRES_PASSWORD: cashflow
          POSTGRES_DB: cashflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cashflow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: cashflow
      DB_PASSWORD: cashflow
      DB_NAME: cashflow
      DB_SSLMODE: disable
      AUTH_JWT_SECRET: ci-test-secret
      AUTH_LOCAL_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run migrations
        working-directory: ./backend
        run: |
          for f in migrations/*.up.sql; do
            psql "postgres://cashflow:cashflow@localhost:5432/cashflow?sslmode=disable" -f "$f"
          done

      - name: Run tests
        working-directory: ./backend
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56
          working-directory: ./backend

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - service: tenant-service
            dockerfile: infra/docker/Dockerfile
          - service: ingestion-service
            dockerfile: infra/docker/Dockerfile.ingestion
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: cashflow/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
